name: Test Charm

on:
  push:
    branches: [ main ]
    paths:
      - 'charm/**'
      - 'server/**'
      - 'client/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/test.yaml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.10'
      
      - name: Install dependencies
        working-directory: charm
        run: |
          uv pip install flake8 black isort
          uv pip install -r requirements.txt
      
      - name: Run flake8
        working-directory: charm
        run: uv run flake8 src/ tests/ --max-line-length=100 --ignore=E203,W503
      
      - name: Check code formatting with black
        working-directory: charm
        run: uv run black --check src/ tests/
      
      - name: Check import sorting with isort
        working-directory: charm
        run: uv run isort --check-only src/ tests/

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.10'
      
      - name: Install dependencies
        working-directory: charm
        run: |
          uv pip install -r requirements.txt
          uv pip install coverage pytest
      
      - name: Run unit tests with coverage
        working-directory: charm
        run: |
          export PYTHONPATH="${PYTHONPATH}:${PWD}/src"
          uv run coverage run -m pytest tests/
          uv run coverage report -m
          uv run coverage xml
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./charm/coverage.xml
          flags: unittests
          name: charm-coverage

  build-rust:
    name: Build Rust Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      
      - name: Build webhook-relay server
        run: cargo build --release --manifest-path=server/Cargo.toml
      
      - name: Build relayd client
        run: cargo build --release --manifest-path=client/Cargo.toml
      
      - name: Upload binaries as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-binaries
          path: |
            target/release/webhook-relay
            target/release/relayd

  pack-charm:
    name: Pack Charm
    runs-on: ubuntu-latest
    needs: [lint, unit-test, build-rust]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup LXD
        uses: canonical/setup-lxd@main
      
      - name: Install charmcraft
        run: sudo snap install charmcraft --classic
      
      - name: Download Rust binaries
        uses: actions/download-artifact@v4
        with:
          name: rust-binaries
          path: target/release/
      
      - name: Make binaries executable
        run: |
          chmod +x target/release/webhook-relay
          chmod +x target/release/relayd
      
      - name: Create bin directory in charm
        run: mkdir -p charm/bin
      
      - name: Copy binaries to charm
        run: |
          cp target/release/webhook-relay charm/bin/
          cp target/release/relayd charm/bin/
      
      - name: Pack charm
        working-directory: charm
        run: charmcraft pack
      
      - name: Upload charm artifact
        uses: actions/upload-artifact@v4
        with:
          name: webhook-relay-charm
          path: charm/*.charm

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [pack-charm]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup LXD
        uses: canonical/setup-lxd@v1
        with:
          channel: 5.21/stable
      
      - name: Configure LXD IPv6
        run: |
          lxc network set lxdbr0 ipv6.address none
          lxc network set lxdbr0 ipv6.dhcp false
          lxc network set lxdbr0 ipv6.nat false
      
      - name: Install Juju
        run: sudo snap install juju --channel 3.6/stable
      
      - name: Bootstrap Juju
        run: juju bootstrap localhost test-controller --config test-mode=true
      
      - name: Add Juju model
        run: juju add-model test-model
      
      - name: Download charm
        uses: actions/download-artifact@v4
        with:
          name: webhook-relay-charm
          path: charm/
      
      - name: Deploy charm in webhook mode
        run: |
          juju deploy ./charm/*.charm webhook-relay --config mode=server --config port=3000
          juju wait-for application webhook-relay --timeout=10m
      
      - name: Test webhook mode status
        run: |
          juju status webhook-relay
          juju exec --unit webhook-relay/0 -- systemctl status webhook-relay
      
      - name: Deploy charm in relayd mode
        run: |
          juju deploy ./charm/*.charm relay-client --config mode=client --config url=http://test.example.com/test
          juju wait-for application relay-client --timeout=10m
      
      - name: Test relayd mode status
        run: |
          juju status relay-client
          juju exec --unit relay-client/0 -- systemctl status webhook-relay

      - name: Set up multiple channels on server
        run: |
          # We will set up 8 channels to test all combinations of:
          # (Auth, Secret, Key)
          
          # C0: Auth=NO,  Secret=NO,  Key=NO
          C0_ID=$(echo -n "test-c0" | sha1sum | awk '{print $1}')
          
          # C1: Auth=NO,  Secret=NO,  Key=YES
          C1_ID=$(echo -n "test-c1" | sha1sum | awk '{print $1}')
          C1_KEY="-----BEGIN PUBLIC KEY-----\nMFwwDQYJKoZIhvcNAQEBBQADSwAwSAJBALK1t33m\n-----END PUBLIC KEY-----"
          
          # C2: Auth=NO,  Secret=YES, Key=NO
          C2_ID=$(echo -n "test-c2" | sha1sum | awk '{print $1}')
          C2_SEC="sec2"
          
          # C3: Auth=YES, Secret=NO,  Key=NO
          C3_ID=$(echo -n "test-c3" | sha1sum | awk '{print $1}')
          C3_AUTH="u3:p3"
          
          # C4: Auth=NO,  Secret=YES, Key=YES
          C4_ID=$(echo -n "test-c4" | sha1sum | awk '{print $1}')
          C4_SEC="sec4"
          C4_KEY="-----BEGIN PUBLIC KEY-----\nMFwwDQYJKoZIhvcNAQEBBQADSwAwSAJBALK1t33m\n-----END PUBLIC KEY-----"
          
          # C5: Auth=YES, Secret=NO,  Key=YES
          C5_ID=$(echo -n "test-c5" | sha1sum | awk '{print $1}')
          C5_AUTH="u5:p5"
          C5_KEY="-----BEGIN PUBLIC KEY-----\nMFwwDQYJKoZIhvcNAQEBBQADSwAwSAJBALK1t33m\n-----END PUBLIC KEY-----"
          
          # C6: Auth=YES, Secret=YES, Key=NO
          C6_ID=$(echo -n "test-c6" | sha1sum | awk '{print $1}')
          C6_SEC="sec6"
          C6_AUTH="u6:p6"
          
          # C7: Auth=YES, Secret=YES, Key=YES
          C7_ID=$(echo -n "test-c7" | sha1sum | awk '{print $1}')
          C7_SEC="sec7"
          C7_AUTH="u7:p7"
          C7_KEY="-----BEGIN PUBLIC KEY-----\nMFwwDQYJKoZIhvcNAQEBBQADSwAwSAJBALK1t33m\n-----END PUBLIC KEY-----"
          
          # Save to ENV for later steps
          echo "C0_ID=$C0_ID" >> $GITHUB_ENV
          
          echo "C1_ID=$C1_ID" >> $GITHUB_ENV
          echo "C1_KEY=$C1_KEY" >> $GITHUB_ENV
          
          echo "C2_ID=$C2_ID" >> $GITHUB_ENV
          echo "C2_SEC=$C2_SEC" >> $GITHUB_ENV
          
          echo "C3_ID=$C3_ID" >> $GITHUB_ENV
          echo "C3_AUTH=$C3_AUTH" >> $GITHUB_ENV
          
          echo "C4_ID=$C4_ID" >> $GITHUB_ENV
          echo "C4_SEC=$C4_SEC" >> $GITHUB_ENV
          echo "C4_KEY=$C4_KEY" >> $GITHUB_ENV
          
          echo "C5_ID=$C5_ID" >> $GITHUB_ENV
          echo "C5_AUTH=$C5_AUTH" >> $GITHUB_ENV
          echo "C5_KEY=$C5_KEY" >> $GITHUB_ENV
          
          echo "C6_ID=$C6_ID" >> $GITHUB_ENV
          echo "C6_SEC=$C6_SEC" >> $GITHUB_ENV
          echo "C6_AUTH=$C6_AUTH" >> $GITHUB_ENV
          
          echo "C7_ID=$C7_ID" >> $GITHUB_ENV
          echo "C7_SEC=$C7_SEC" >> $GITHUB_ENV
          echo "C7_AUTH=$C7_AUTH" >> $GITHUB_ENV
          echo "C7_KEY=$C7_KEY" >> $GITHUB_ENV
          
          # Apply config
          juju config webhook-relay \
            channel0=$C0_ID \
            channel1=$C1_ID key1="$C1_KEY" \
            channel2=$C2_ID secret2=$C2_SEC \
            channel3=$C3_ID auth3=$C3_AUTH \
            channel4=$C4_ID secret4=$C4_SEC key4="$C4_KEY" \
            channel5=$C5_ID auth5=$C5_AUTH key5="$C5_KEY" \
            channel6=$C6_ID secret6=$C6_SEC auth6=$C6_AUTH \
            channel7=$C7_ID secret7=$C7_SEC auth7=$C7_AUTH key7="$C7_KEY"
            
          juju wait-for application webhook-relay --timeout=5m
          echo "Server configured with 8 test channels"


      - name: "Configure relay-client (C0: No Auth, No Secret, No Key)"
        run: |
          SERVER_IP=$(juju status --format json | \
            python3 -c "import json,sys; d=json.load(sys.stdin); \
            print(d['applications']['webhook-relay']['units']['webhook-relay/0']['public-address'])")
          echo "Server IP: $SERVER_IP"
          echo "SERVER_IP=$SERVER_IP" >> $GITHUB_ENV
          
          juju config relay-client \
            url="http://${SERVER_IP}:3000/${{ env.C0_ID }}" \
            store=/srv/payload_store \
            auth="" \
            secret="" \
            key=""
          juju wait-for application relay-client --timeout=5m
          sleep 5
          
          PAYLOAD='{"test":"c0_test"}'
          curl -sf -X POST "http://${SERVER_IP}:3000/${{ env.C0_ID }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
            
          sleep 5
          BODY_FILE=$(juju exec --unit relay-client/0 -- \
            sh -c 'ls -t /srv/payload_store/*.body.json 2>/dev/null | head -1')
          juju exec --unit relay-client/0 -- cat "$BODY_FILE" | grep -q "c0_test" \
            && echo "✅ C0 (None) webhook received successfully" \
            || { echo "❌ C0 webhook not received"; exit 1; }

      - name: "Configure relay-client (C1: Key-only)"
        run: |
          juju config relay-client \
            url="http://${SERVER_IP}:3000/${{ env.C1_ID }}" \
            auth="" \
            secret="" \
            key="-----BEGIN PRIVATE KEY-----\nMIIBVgIBADANBgkqhkiG9w0BAQEFAASCAUAwggE8AgEAAkEAoR7M\n-----END PRIVATE KEY-----"
          juju wait-for application relay-client --timeout=5m
          sleep 5
          
          PAYLOAD='{"test":"c1_test"}'
          curl -sf -X POST "http://${SERVER_IP}:3000/${{ env.C1_ID }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
            
          sleep 5
          BODY_FILE=$(juju exec --unit relay-client/0 -- \
            sh -c 'ls -t /srv/payload_store/*.body.json 2>/dev/null | head -1')
          juju exec --unit relay-client/0 -- cat "$BODY_FILE" | grep -q "c1_test" \
            && echo "✅ C1 (Key-only) webhook received successfully" \
            || { echo "❌ C1 webhook not received"; exit 1; }

      - name: "Configure relay-client (C2: Secret-only)"
        run: |
          juju config relay-client \
            url="http://${SERVER_IP}:3000/${{ env.C2_ID }}" \
            auth="" \
            secret="${{ env.C2_SEC }}" \
            key=""
          juju wait-for application relay-client --timeout=5m
          sleep 5
          
          PAYLOAD='{"test":"c2_test"}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha1 -hmac "${{ env.C2_SEC }}" | awk '{print $2}')
          curl -sf -X POST "http://${SERVER_IP}:3000/${{ env.C2_ID }}" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature: sha1=$SIGNATURE" \
            -d "$PAYLOAD"
            
          sleep 5
          BODY_FILE=$(juju exec --unit relay-client/0 -- \
            sh -c 'ls -t /srv/payload_store/*.body.json 2>/dev/null | head -1')
          juju exec --unit relay-client/0 -- cat "$BODY_FILE" | grep -q "c2_test" \
            && echo "✅ C2 (Secret-only) webhook received successfully" \
            || { echo "❌ C2 webhook not received"; exit 1; }

      - name: "Configure relay-client (C3: Auth-only)"
        run: |
          juju config relay-client \
            url="http://${SERVER_IP}:3000/${{ env.C3_ID }}" \
            auth="${{ env.C3_AUTH }}" \
            secret="" \
            key=""
          juju wait-for application relay-client --timeout=5m
          sleep 5
          
          PAYLOAD='{"test":"c3_test"}'
          curl -sf -X POST "http://${SERVER_IP}:3000/${{ env.C3_ID }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
            
          sleep 5
          BODY_FILE=$(juju exec --unit relay-client/0 -- \
            sh -c 'ls -t /srv/payload_store/*.body.json 2>/dev/null | head -1')
          juju exec --unit relay-client/0 -- cat "$BODY_FILE" | grep -q "c3_test" \
            && echo "✅ C3 (Auth-only) webhook received successfully" \
            || { echo "❌ C3 webhook not received"; exit 1; }

      - name: "Configure relay-client (C4: Secret+Key)"
        run: |
          juju config relay-client \
            url="http://${SERVER_IP}:3000/${{ env.C4_ID }}" \
            auth="" \
            secret="${{ env.C4_SEC }}" \
            key="-----BEGIN PRIVATE KEY-----\nMIIBVgIBADANBgkqhkiG9w0BAQEFAASCAUAwggE8AgEAAkEAoR7M\n-----END PRIVATE KEY-----"
          juju wait-for application relay-client --timeout=5m
          sleep 5
          
          PAYLOAD='{"test":"c4_test"}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha1 -hmac "${{ env.C4_SEC }}" | awk '{print $2}')
          curl -sf -X POST "http://${SERVER_IP}:3000/${{ env.C4_ID }}" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature: sha1=$SIGNATURE" \
            -d "$PAYLOAD"
            
          sleep 5
          BODY_FILE=$(juju exec --unit relay-client/0 -- \
            sh -c 'ls -t /srv/payload_store/*.body.json 2>/dev/null | head -1')
          juju exec --unit relay-client/0 -- cat "$BODY_FILE" | grep -q "c4_test" \
            && echo "✅ C4 (Secret+Key) webhook received successfully" \
            || { echo "❌ C4 webhook not received"; exit 1; }

      - name: "Configure relay-client (C5: Auth+Key)"
        run: |
          juju config relay-client \
            url="http://${SERVER_IP}:3000/${{ env.C5_ID }}" \
            auth="${{ env.C5_AUTH }}" \
            secret="" \
            key="-----BEGIN PRIVATE KEY-----\nMIIBVgIBADANBgkqhkiG9w0BAQEFAASCAUAwggE8AgEAAkEAoR7M\n-----END PRIVATE KEY-----"
          juju wait-for application relay-client --timeout=5m
          sleep 5
          
          PAYLOAD='{"test":"c5_test"}'
          curl -sf -X POST "http://${SERVER_IP}:3000/${{ env.C5_ID }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
            
          sleep 5
          BODY_FILE=$(juju exec --unit relay-client/0 -- \
            sh -c 'ls -t /srv/payload_store/*.body.json 2>/dev/null | head -1')
          juju exec --unit relay-client/0 -- cat "$BODY_FILE" | grep -q "c5_test" \
            && echo "✅ C5 (Auth+Key) webhook received successfully" \
            || { echo "❌ C5 webhook not received"; exit 1; }

      - name: "Configure relay-client (C6: Auth+Secret)"
        run: |
          juju config relay-client \
            url="http://${SERVER_IP}:3000/${{ env.C6_ID }}" \
            auth="${{ env.C6_AUTH }}" \
            secret="${{ env.C6_SEC }}" \
            key=""
          juju wait-for application relay-client --timeout=5m
          sleep 5
          
          PAYLOAD='{"test":"c6_test"}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha1 -hmac "${{ env.C6_SEC }}" | awk '{print $2}')
          curl -sf -X POST "http://${SERVER_IP}:3000/${{ env.C6_ID }}" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature: sha1=$SIGNATURE" \
            -d "$PAYLOAD"
            
          sleep 5
          BODY_FILE=$(juju exec --unit relay-client/0 -- \
            sh -c 'ls -t /srv/payload_store/*.body.json 2>/dev/null | head -1')
          juju exec --unit relay-client/0 -- cat "$BODY_FILE" | grep -q "c6_test" \
            && echo "✅ C6 (Auth+Secret) webhook received successfully" \
            || { echo "❌ C6 webhook not received"; exit 1; }

      - name: "Configure relay-client (C7: Auth+Secret+Key)"
        run: |
          juju config relay-client \
            url="http://${SERVER_IP}:3000/${{ env.C7_ID }}" \
            auth="${{ env.C7_AUTH }}" \
            secret="${{ env.C7_SEC }}" \
            key="-----BEGIN PRIVATE KEY-----\nMIIBVgIBADANBgkqhkiG9w0BAQEFAASCAUAwggE8AgEAAkEAoR7M\n-----END PRIVATE KEY-----"
            
          juju wait-for application relay-client --timeout=5m
          
      - name: Verify C7 flags in ExecStart
        run: |
          EXEC_START=$(juju exec --unit relay-client/0 -- \
            systemctl show webhook-relay -p ExecStart)
          echo "ExecStart: $EXEC_START"
          echo "$EXEC_START" | grep -q -- "--store /srv/payload_store"
          echo "$EXEC_START" | grep -q -- "--user u7 --pass p7"
          echo "✅ --store and --user/--pass flags present in service ExecStart"

      - name: Send C7 webhook and verify
        run: |
          sleep 5  # Allow client to establish SSE connection
          PAYLOAD='{"test":"c7_test","source":"integration","ts":'$(date +%s)'}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha1 -hmac "${{ env.C7_SEC }}" | awk '{print $2}')
          curl -sf -X POST "http://${SERVER_IP}:3000/${{ env.C7_ID }}" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature: sha1=$SIGNATURE" \
            -d "$PAYLOAD"
          
          sleep 5
          BODY_FILE=$(juju exec --unit relay-client/0 -- \
            sh -c 'ls -t /srv/payload_store/*.body.json 2>/dev/null | head -1')
          CONTENT=$(juju exec --unit relay-client/0 -- cat "$BODY_FILE")
          echo "$CONTENT" | grep -q "c7_test" \
            && echo "✅ C7 (Auth+Secret+Key) webhook received successfully" \
            || { echo "❌ C7 webhook not received"; exit 1; }


      - name: Test invalid store path is rejected
        run: |
          juju config relay-client store=relative/path
          sleep 10  # Allow config-changed to process
          STATUS=$(juju status --format json | \
            python3 -c "import json,sys; d=json.load(sys.stdin); \
            print(d['applications']['relay-client']['units']['relay-client/0']['workload-status']['current'])")
          echo "Status after invalid store path: $STATUS"
          if [ "$STATUS" = "blocked" ]; then
            echo "✅ Invalid store path correctly causes blocked status"
          else
            echo "❌ Expected blocked status, got: $STATUS"
            exit 1
          fi
          # Restore valid configuration
          juju config relay-client store=/srv/payload_store
          juju wait-for application relay-client --timeout=5m
          echo "✅ Valid store path restored"

      - name: Test invalid client auth format is rejected
        run: |
          juju config relay-client auth=invalid-format
          sleep 10
          STATUS=$(juju status --format json | \
            python3 -c "import json,sys; d=json.load(sys.stdin); \
            print(d['applications']['relay-client']['units']['relay-client/0']['workload-status']['current'])")
          echo "Status after invalid auth format: $STATUS"
          if [ "$STATUS" = "blocked" ]; then
            echo "✅ Invalid auth format correctly causes blocked status"
          else
            echo "❌ Expected blocked status for invalid auth, got: $STATUS"
            exit 1
          fi
          juju config relay-client \
            auth="${{ env.C7_AUTH }}" \
            secret="${{ env.C7_SEC }}" \
            key="-----BEGIN PRIVATE KEY-----\nMIIBVgIBADANBgkqhkiG9w0BAQEFAASCAUAwggE8AgEAAkEAoR7M\n-----END PRIVATE KEY-----"
          juju wait-for application relay-client --timeout=5m
          echo "✅ Valid auth restored"

      - name: Show logs on failure
        if: failure()
        run: |
          juju debug-log --replay --no-tail
          juju status

  functional-test:
    name: Functional Tests (Forwarding)
    runs-on: ubuntu-latest
    needs: [build-rust]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download Rust binaries
        uses: actions/download-artifact@v4
        with:
          name: rust-binaries
          path: target/release/
      
      - name: Make binaries executable
        run: |
          chmod +x target/release/webhook-relay
          chmod +x target/release/relayd
      
      - name: Setup test environment
        run: |
          mkdir -p /tmp/webhook-test/secret /tmp/webhook-test/auth
          CHANNEL_ID=$(echo -n "test-channel" | sha1sum | awk '{print $1}')
          AUTH_USER="funcuser"
          AUTH_PASS="funcpass"
          AUTH_TOKEN=$(printf '%s' "${AUTH_USER}:${AUTH_PASS}" | base64 -w0)
          echo -n "test-secret-123" > /tmp/webhook-test/secret/$CHANNEL_ID
          echo -n "$AUTH_TOKEN" > /tmp/webhook-test/auth/$CHANNEL_ID
          echo "CHANNEL_ID=$CHANNEL_ID" >> $GITHUB_ENV
          echo "AUTH_USER=$AUTH_USER" >> $GITHUB_ENV
          echo "AUTH_PASS=$AUTH_PASS" >> $GITHUB_ENV
          echo "Test environment ready with channel: $CHANNEL_ID"
      
      - name: Start webhook server
        run: |
          cd /tmp/webhook-test
          PORT=3000 HOST=127.0.0.1 PING_INTERVAL_MS=3000 \
            $GITHUB_WORKSPACE/target/release/webhook-relay > server.log 2>&1 &
          echo $! > server.pid
          sleep 2
          echo "Webhook server started"
      
      - name: Start HTTP receiver
        run: |
          python3 -c "
          import http.server
          import socketserver
          import json
          from datetime import datetime
          
          class Handler(http.server.BaseHTTPRequestHandler):
              def do_POST(self):
                  length = int(self.headers.get('Content-Length', 0))
                  data = self.rfile.read(length)
                  timestamp = datetime.now().strftime('%H:%M:%S.%f')[:-3]
                  print(f'[{timestamp}] RECEIVED: {data.decode(\"utf-8\")}', flush=True)
                  self.send_response(200)
                  self.send_header('Content-type', 'text/plain')
                  self.end_headers()
                  self.wfile.write(b'OK')
              def log_message(self, format, *args):
                  pass
          
          print('Receiver ready on port 8888', flush=True)
          with socketserver.TCPServer(('127.0.0.1', 8888), Handler) as httpd:
              httpd.serve_forever()
          " > /tmp/receiver.log 2>&1 &
          echo $! > /tmp/receiver.pid
          sleep 2
          echo "HTTP receiver started"
      
      - name: Start relayd with forwarding and Basic Auth
        run: |
          RUST_LOG=info $GITHUB_WORKSPACE/target/release/relayd \
            "http://127.0.0.1:3000/${{ env.CHANNEL_ID }}" \
            /dev/null \
            http://127.0.0.1:8888/webhook \
            --user "${{ env.AUTH_USER }}" \
            --pass "${{ env.AUTH_PASS }}" > /tmp/relayd.log 2>&1 &
          echo $! > /tmp/relayd.pid
          sleep 3
          echo "Relayd started with forwarding + Basic Auth"
      
      - name: Test webhook forwarding
        run: |
          # Send test webhook
          PAYLOAD='{"test":"ci_webhook","message":"Testing forwarding","timestamp":'$(date +%s)'}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha1 -hmac "test-secret-123" | awk '{print $2}')
          
          echo "Sending webhook to channel: ${{ env.CHANNEL_ID }}"
          curl -X POST "http://127.0.0.1:3000/${{ env.CHANNEL_ID }}" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature: sha1=$SIGNATURE" \
            -d "$PAYLOAD"
          
          sleep 2
          
          # Verify webhook was forwarded
          if grep -q "RECEIVED.*ci_webhook" /tmp/receiver.log; then
            echo "✅ Webhook successfully forwarded"
          else
            echo "❌ Webhook was NOT forwarded"
            exit 1
          fi
          
          # Verify relayd logged the forward
          if grep -q "Successfully forwarded payload" /tmp/relayd.log; then
            echo "✅ Relayd confirmed forwarding"
          else
            echo "❌ Relayd did not confirm forwarding"
            exit 1
          fi
      
      - name: Test --store flag (payload persistence)
        run: |
          # Stop the forwarding relayd and start a new one with --store
          [ -f /tmp/relayd.pid ] && kill $(cat /tmp/relayd.pid) 2>/dev/null || true
          sleep 1

          mkdir -p /tmp/webhook-store
          RUST_LOG=info $GITHUB_WORKSPACE/target/release/relayd \
            "http://127.0.0.1:3000/${{ env.CHANNEL_ID }}" \
            /dev/null \
            --store /tmp/webhook-store \
            --user "${{ env.AUTH_USER }}" \
            --pass "${{ env.AUTH_PASS }}" > /tmp/relayd-store.log 2>&1 &
          echo $! > /tmp/relayd.pid
          sleep 3
          echo "Relayd started with --store /tmp/webhook-store"

          # Send a webhook payload
          PAYLOAD='{"test":"store_webhook","message":"Testing store flag","timestamp":'$(date +%s)'}'
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha1 -hmac "test-secret-123" | awk '{print $2}')

          curl -X POST "http://127.0.0.1:3000/${{ env.CHANNEL_ID }}" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature: sha1=$SIGNATURE" \
            -d "$PAYLOAD"

          sleep 2

          # Verify header and body JSON files were created
          HEADER_FILE=$(ls /tmp/webhook-store/*.header.json 2>/dev/null | head -1)
          BODY_FILE=$(ls /tmp/webhook-store/*.body.json 2>/dev/null | head -1)

          if [ -n "$HEADER_FILE" ] && [ -n "$BODY_FILE" ]; then
            echo "✅ Store files created:"
            echo "   Header: $HEADER_FILE"
            echo "   Body:   $BODY_FILE"
            grep -q "store_webhook" "$BODY_FILE" && echo "✅ Body file contains expected payload" || { echo "❌ Body file missing expected payload"; exit 1; }
          else
            echo "❌ No store files found in /tmp/webhook-store"
            ls -la /tmp/webhook-store/ || true
            cat /tmp/relayd-store.log || true
            exit 1
          fi

      - name: Test ping event filtering
        run: |
          # Get initial receiver log size
          INITIAL_SIZE=$(wc -l < /tmp/receiver.log)
          
          echo "Waiting 6 seconds for ping events (interval: 3s)..."
          sleep 6
          
          # Check if receiver got any ping events (it should NOT)
          FINAL_SIZE=$(wc -l < /tmp/receiver.log)
          if [ "$FINAL_SIZE" -eq "$INITIAL_SIZE" ]; then
            echo "✅ Ping events were NOT forwarded (correct behavior)"
          else
            echo "❌ Receiver log changed during ping period:"
            tail -10 /tmp/receiver.log
            exit 1
          fi
          
          # Verify relayd received pings
          if grep -q "ping" /tmp/relayd.log || grep -q "heartbeat" /tmp/relayd.log; then
            echo "✅ Relayd received ping events but did not forward them"
          else
            echo "⚠️  Warning: No ping events detected in relayd log"
          fi
      
      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Webhook Server Log ==="
          cat /tmp/webhook-test/server.log || echo "No server log"
          echo ""
          echo "=== Relayd Log ==="
          cat /tmp/relayd.log || echo "No relayd log"
          echo ""
          echo "=== Relayd Store Log ==="
          cat /tmp/relayd-store.log || echo "No relayd-store log"
          echo ""
          echo "=== Receiver Log ==="
          cat /tmp/receiver.log || echo "No receiver log"
      
      - name: Cleanup
        if: always()
        run: |
          [ -f /tmp/relayd.pid ] && kill $(cat /tmp/relayd.pid) 2>/dev/null || true
          [ -f /tmp/receiver.pid ] && kill $(cat /tmp/receiver.pid) 2>/dev/null || true
          [ -f /tmp/webhook-test/server.pid ] && kill $(cat /tmp/webhook-test/server.pid) 2>/dev/null || true
